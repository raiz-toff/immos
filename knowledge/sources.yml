# ============================================================
# IMMIGRATION-OPS — Installed Country Packs Index
# Version 2.0.0 | Thin index (Phase 3)
# ============================================================
#
# As of Phase 3, the authoritative per-domain source URLs live inside each
# country pack at knowledge/countries/<code>/pack.yml. This file is now a
# THIN INDEX: it lists which packs are installed and their status, so the
# startup routine and country-detection logic know what is available without
# loading every pack.
#
# To read WHERE to fetch a given domain for a country, open that country's
# pack.yml `sources:` block. To ADD a country, run modes/country.md
# (bootstrap) — it web-confirms the authority and each source URL before
# writing the pack. A pack is never populated from training data alone.
#
# Pack status meanings:
#   draft     — structure complete; URLs present but not all re-fetched/verified
#   community — fetch-confirmed by the pack-builder flow, terminology filled
#   verified  — independently reviewed against the authority's own pages
#
# Fetch failure hierarchy and freshness tiers are unchanged — see AGENTS.md §5.
# The per-source fetch cascade (url → fallback_url → fallback_query →
# last_known_good) now reads from each pack's `sources:` entries.
# ============================================================

installed_packs:

  us:
    pack: "knowledge/countries/us/pack.yml"
    authority: "USCIS"
    status: draft
    migrated: "2026-07-03"

  ca:
    pack: "knowledge/countries/ca/pack.yml"
    authority: "IRCC"
    status: draft
    migrated: "2026-07-03"

  uk:
    pack: "knowledge/countries/uk/pack.yml"
    authority: "UKVI / Home Office"
    status: draft
    migrated: "2026-07-03"

# Template for new packs: knowledge/countries/_TEMPLATE/pack.yml
